<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万渔丰 · GEO 内容管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0d6efd;
      --primary-dark: #0a58ca;
      --success: #198754;
      --warning: #fd7e14;
      --danger: #dc3545;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6c757d;
      --border: #e2e8f0;
      --sidebar-bg: #1a1a2e;
      --sidebar-text: #a8b2d8;
      --sidebar-active: #64ffda;
      --accent: #00b4d8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* 侧边栏 */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-logo .brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--sidebar-active);
      letter-spacing: 0.5px;
    }

    .sidebar-logo .sub {
      font-size: 11px;
      color: var(--sidebar-text);
      margin-top: 4px;
      opacity: 0.7;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
    }

    .nav-section {
      padding: 8px 20px 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(168,178,216,0.4);
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(100,255,218,0.08);
      color: var(--sidebar-active);
      border-left-color: var(--sidebar-active);
    }

    /* 主内容区 */
    .main-content {
      margin-left: 240px;
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    /* 卡片 */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-label .tip {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: normal;
      margin-left: 8px;
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
    }

    textarea.form-control {
      resize: vertical;
      line-height: 1.6;
    }

    /* 标签选择 */
    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .tag:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .tag.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tag .delete-btn {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      color: inherit;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover .delete-btn {
      display: flex;
    }

    .tag .delete-btn:hover {
      background: var(--danger);
    }

    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-lg {
      padding: 14px 24px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">万渔丰 GEO</div>
      <div class="sub">内容管理系统</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">核心功能</div>
      <div class="nav-item active" data-page="dashboard">📊 数据看板</div>
      <div class="nav-item" data-page="create">✍️ 内容创作</div>
      <div class="nav-item" data-page="library">📚 内容库</div>
      <div class="nav-item" data-page="keywords">🔑 关键词</div>
      <div class="nav-item" data-page="knowledge">📖 知识库</div>
      <div class="nav-section">系统</div>
      <div class="nav-item" data-page="settings">⚙️ API 设置</div>
    </nav>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 数据看板 -->
    <div class="page active" id="page-dashboard">
      <h1 style="margin-bottom: 20px;">GEO 建设进度</h1>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📊 统计概览</div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
          <div style="padding: 16px; background: #f8f9fa; border-radius: 8px;">
            <div style="font-size: 12px; color: var(--text-muted);">总内容数</div>
            <div style="font-size: 24px; font-weight: 700; margin-top: 8px;" id="stat-total">0</div>
          </div>
          <div style="padding: 16px; background: #e3f2fd; border-radius: 8px;">
            <div style="font-size: 12px; color: var(--text-muted);">知乎</div>
            <div style="font-size: 24px; font-weight: 700; margin-top: 8px;" id="stat-zhihu">0 / 0</div>
          </div>
          <div style="padding: 16px; background: #fff3e0; border-radius: 8px;">
            <div style="font-size: 12px; color: var(--text-muted);">今日头条</div>
            <div style="font-size: 24px; font-weight: 700; margin-top: 8px;" id="stat-toutiao">0 / 0</div>
          </div>
          <div style="padding: 16px; background: #e8f5e9; border-radius: 8px;">
            <div style="font-size: 12px; color: var(--text-muted);">网站</div>
            <div style="font-size: 24px; font-weight: 700; margin-top: 8px;" id="stat-website">0 / 0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 内容创作 -->
    <div class="page" id="page-create">
      <h1 style="margin-bottom: 20px;">✍️ 内容创作</h1>
      <div class="card">
        <div class="form-group">
          <label class="form-label">重点突出（卖点标签）</label>
          <div class="tag-group" id="highlight-tags">
            <!-- 标签将动态加载 -->
          </div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <input type="text" class="form-control" id="new-tag-input" placeholder="输入新的卖点标签..." onkeypress="if(event.key === 'Enter') addNewTag()">
            <button type="button" class="btn btn-primary" onclick="addNewTag()">+ 添加</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 其他页面占位 -->
    <div class="page" id="page-library">📚 内容库页面</div>
    <div class="page" id="page-keywords">🔑 关键词页面</div>
    <div class="page" id="page-knowledge">📖 知识库页面</div>
    <div class="page" id="page-settings">⚙️ API 设置页面</div>
  </div>

  <script>
    // ==================== 标签管理 ====================
    
    // 默认标签
    const defaultTags = [
      { name: '山泉水吊水', selected: true },
      { name: '水库鱼来源', selected: true },
      { name: '吊水10-30天', selected: false },
      { name: '深圳中转仓', selected: false },
      { name: '两个吊水基地', selected: false },
      { name: '餐饮直供', selected: false },
      { name: '鱼生品质', selected: false }
    ];

    // 从 localStorage 加载标签
    function loadTags() {
      const saved = localStorage.getItem('geo_highlight_tags');
      if (saved) {
        return JSON.parse(saved);
      }
      return [...defaultTags];
    }

    // 保存标签到 localStorage
    function saveTags(tags) {
      localStorage.setItem('geo_highlight_tags', JSON.stringify(tags));
    }

    // 渲染标签
    function renderTags() {
      const container = document.getElementById('highlight-tags');
      const tags = loadTags();
      
      container.innerHTML = tags.map((tag, index) => `
        <div class="tag ${tag.selected ? 'selected' : ''}" 
             data-index="${index}"
             onclick="toggleTag(${index})">
          ${tag.name}
          <span class="delete-btn" onclick="event.stopPropagation(); deleteTag(${index})">×</span>
        </div>
      `).join('');
    }

    // 切换标签选中状态
    function toggleTag(index) {
      const tags = loadTags();
      tags[index].selected = !tags[index].selected;
      saveTags(tags);
      renderTags();
    }

    // 删除标签
    function deleteTag(index) {
      const tags = loadTags();
      tags.splice(index, 1);
      saveTags(tags);
      renderTags();
      showToast('🗑️ 标签已删除');
    }

    // 添加新标签
    function addNewTag() {
      const input = document.getElementById('new-tag-input');
      const tagName = input.value.trim();
      
      if (!tagName) {
        showToast('⚠️ 请输入标签名称');
        return;
      }
      
      const tags = loadTags();
      
      // 检查是否已存在
      if (tags.some(t => t.name === tagName)) {
        showToast('⚠️ 该标签已存在');
        return;
      }
      
      tags.push({ name: tagName, selected: false });
      saveTags(tags);
      renderTags();
      input.value = '';
      showToast('✅ 标签添加成功');
    }

    // Toast 提示
    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        background: #333;
        color: #fff;
        border-radius: 8px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // 页面切换
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        const page = item.dataset.page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${page}`).classList.add('active');
      });
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      renderTags();
    });

    // 更新统计数据
    function updateStats() {
      const contents = JSON.parse(localStorage.getItem('geo_contents') || '[]');
      const records = JSON.parse(localStorage.getItem('geo_publish_records') || '{}');
      
      let zhihuCount = 0, toutiaoCount = 0, websiteCount = 0;
      
      contents.forEach(content => {
        const itemRecords = records[content.id] || {};
        if (itemRecords['zhihu']) zhihuCount++;
        if (itemRecords['toutiao']) toutiaoCount++;
        if (itemRecords['website']) websiteCount++;
      });
      
      const zhihuEl = document.getElementById('stat-zhihu');
      const toutiaoEl = document.getElementById('stat-toutiao');
      const websiteEl = document.getElementById('stat-website');
      const totalEl = document.getElementById('stat-total');
      
      if (zhihuEl) zhihuEl.textContent = `${zhihuCount} / ${contents.length}`;
      if (toutiaoEl) toutiaoEl.textContent = `${toutiaoCount} / ${contents.length}`;
      if (websiteEl) websiteEl.textContent = `${websiteCount} / ${contents.length}`;
      if (totalEl) totalEl.textContent = contents.length;
    }
  </script>
</body>
</html>
